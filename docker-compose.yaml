version: "3"
services:

  # proxy serves the static site (compiled WASM client + assets), enforces the
  # TOTP login gate, and proxies the browser's websocket to target hosts.
  proxy:
    container_name: proxy
    build:
      context: .
      dockerfile: ./proxy/Dockerfile
    hostname: proxy
    volumes:
      - ./proxy/logs/:/logs/
    environment:
      # Displayed app name (white-label). Defaults to "python3".
      - APP_NAME=${APP_NAME:-python3}
      - TOTP_SEED=${TOTP_SEED}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_TTL=${SESSION_TTL:-24h}
      # Fail closed: the proxy refuses to start without TOTP_SEED + SESSION_SECRET
      # unless AUTH_DISABLED is explicitly truthy (serves with NO authentication).
      - AUTH_DISABLED=${AUTH_DISABLED:-}
      # Per-source-IP new-connection limit. The default (1/sec) throttles
      # reverse-proxying short-lived connections; "off" disables it for this
      # private deployment. Set a number (conns/sec) to re-enable.
      - SRC_CONN_RATE=${SRC_CONN_RATE:-off}
      - SRC_CONN_BURST=${SRC_CONN_BURST:-}
    command:
      - '/proxy'
      - '-al'
      - '/logs/connections.log'
    ports:
      # Site + websocket. Bound to localhost; public access is via the tunnel.
      - 5555:5555
    # Let the reverse-proxy feature reach services on the Docker host (the
    # machine running the browser, when co-located) via "host.docker.internal".
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  # Cloudflare Tunnel: exposes the site publicly without opening ports. Set
  # TUNNEL_TOKEN in .env (remotely-managed tunnel; configure the ingress to
  # point at http://proxy:5555 in the Cloudflare Zero Trust dashboard).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - proxy
